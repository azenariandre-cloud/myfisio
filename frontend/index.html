/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;min-height:100vh;
  background:#c9d8ee;
  font-family:'Nunito Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
}

/* ═══════════════════════════════════════════
   PHONE SHELL
═══════════════════════════════════════════ */
#app{
  width:375px;height:812px;
  background:#f0f4f8;
  border-radius:44px;
  overflow:hidden;
  position:relative;
  border:10px solid #111827;
  box-shadow:0 0 0 2px #374151,0 40px 100px rgba(0,0,0,.45),0 10px 30px rgba(0,0,0,.25);
}

/* ═══════════════════════════════════════════
   SCREENS — cada tela ocupa 100% do frame
═══════════════════════════════════════════ */
.page{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  background:#f0f4f8;
  transition:opacity .18s;
}
.page.active{display:flex;}

/* ═══════════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════════ */
.sbar{
  height:44px;display:flex;align-items:center;
  justify-content:center;padding:0 20px;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.sbar-blue{background:#1a73e8;color:#fff;}
.sbar-dark{background:#0a1628;color:#7fb3e8;}
.sbar .time{font-size:15px;font-weight:700;}
.sbar .logo{font-family:'Nunito',sans-serif;font-weight:800;}
.sbar .logo-acc{color:#93c5fd;}
.sbar-dark .logo-acc{color:#4fc3f7;}

/* ═══════════════════════════════════════════
   HERO HEADER (login / cadastro)
═══════════════════════════════════════════ */
.hero-blue{background:#1a73e8;padding:28px 20px 32px;text-align:center;flex-shrink:0;}
.hero-dark{background:#0d2137;padding:20px 20px 24px;flex-shrink:0;}
.hero-sm{padding:18px 20px 22px;}

.logo-mark{
  width:60px;height:60px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 14px;
  background:rgba(255,255,255,.2);color:#fff;
}
.app-name-hero{font-size:24px;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;letter-spacing:-.3px;}
.app-name-hero span{opacity:.75;}
.app-sub-hero{font-size:13px;color:rgba(255,255,255,.7);margin-top:5px;}

/* ═══════════════════════════════════════════
   FORM AREA
═══════════════════════════════════════════ */
.form-area{flex:1;padding:20px 18px 18px;overflow-y:auto;scrollbar-width:none;background:#fff;}
.form-area::-webkit-scrollbar{display:none;}
