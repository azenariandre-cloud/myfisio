# ─────────────────────────────────────────────
#  myFisio — Render.com Deploy Config
#  Coloque este arquivo na RAIZ do repositório.
#  O Render detecta automaticamente e configura tudo.
# ─────────────────────────────────────────────

services:
  # ── API (Node.js / Express) ──────────────────
  - type: web
    name: myfisio-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true        # Redeploy automático a cada push no GitHub
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true   # Render gera automaticamente uma chave segura
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: APP_FEE_PERCENT
        value: 5
      - key: DATABASE_URL
        fromDatabase:
          name: myfisio-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://azenariandre-cloud.github.io

  # ── Frontend (Static Site) ───────────────────
  - type: web
    name: myfisio-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Banco de Dados PostgreSQL (grátis) ─────────
databases:
  - name: myfisio-db
    databaseName: myfisio
    user: myfisio_user
    plan: free
